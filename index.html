<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevVault IDE</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Prism -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

</head>

<body class="bg-[#1e1e1e] text-white flex h-screen">

<!-- SIDEBAR -->
<div class="w-60 bg-[#252526] p-3 overflow-y-auto">
  <h2 class="font-bold mb-3">📁 Explorer</h2>
  <div id="fileTree"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

  <!-- TABS -->
  <div id="tabs" class="flex bg-[#2d2d2d] px-2"></div>

  <!-- EDITOR -->
  <textarea id="editor" class="flex-1 bg-[#1e1e1e] p-4 font-mono"></textarea>

  <!-- ACTION BAR -->
  <div class="bg-[#252526] p-2 flex gap-2">
    <button onclick="saveFile()" class="bg-green-600 px-3 py-1 rounded">Save</button>
    <button onclick="newFile()" class="bg-blue-600 px-3 py-1 rounded">New</button>
    <button onclick="runJS()" class="bg-yellow-500 px-3 py-1 rounded">Run JS</button>
  </div>

  <!-- OUTPUT -->
  <div id="output" class="bg-black p-3 text-green-400 text-sm h-32 overflow-auto"></div>

</div>

<script>
const API_KEY = "$2a$10$5SepU9r2PraMpGxplhm/Cu7O03sM2xA4p32tLGV0dQzhrnwl1S33K";
const BIN_ID = "69c2c25eb7ec241ddc9c01f5";

let files = [];
let openTabs = [];
let currentFile = null;

// LOAD
async function loadFiles(){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: {"X-Master-Key": API_KEY}
  });
  const data = await res.json();
  files = data.record.codes || [];
  renderTree();
}

// TREE
function renderTree(){
  const tree = document.getElementById("fileTree");
  tree.innerHTML = "";

  files.forEach((f,i)=>{
    const div = document.createElement("div");
    div.innerText = "📄 " + f.title;
    div.className = "cursor-pointer hover:bg-gray-700 p-1";
    div.onclick = ()=>openFile(i);
    tree.appendChild(div);
  });
}

// OPEN FILE
function openFile(i){
  currentFile = i;

  if(!openTabs.includes(i)){
    openTabs.push(i);
    renderTabs();
  }

  document.getElementById("editor").value = files[i].code;
}

// TABS
function renderTabs(){
  const tabBar = document.getElementById("tabs");
  tabBar.innerHTML = "";

  openTabs.forEach(i=>{
    const tab = document.createElement("div");
    tab.innerText = files[i].title;
    tab.className = "px-3 py-1 cursor-pointer bg-gray-700 mr-1";
    tab.onclick = ()=>openFile(i);
    tabBar.appendChild(tab);
  });
}

// SAVE
async function saveFile(){
  if(currentFile===null) return;

  files[currentFile].code = document.getElementById("editor").value;

  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":API_KEY
    },
    body:JSON.stringify({codes:files})
  });
}

// NEW FILE
function newFile(){
  const name = prompt("File name:");
  if(!name) return;

  files.push({title:name,code:""});
  currentFile = files.length-1;
  openTabs.push(currentFile);

  renderTree();
  renderTabs();
}

// RUN JS
function runJS(){
  try{
    const code = document.getElementById("editor").value;
    const result = eval(code);
    document.getElementById("output").innerText = result || "Executed";
  }catch(e){
    document.getElementById("output").innerText = e;
  }
}

// INIT
loadFiles();
</script>

</body>
</html>
