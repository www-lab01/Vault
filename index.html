<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Vault Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-4">M4</h1>

  <!-- Input -->
  <div class="bg-gray-800 p-4 rounded mb-4">
    <input id="title" placeholder="Enter title..." 
      class="w-full p-2 mb-2 rounded bg-gray-700">

    <textarea id="code" rows="6" placeholder="Paste your code..." 
      class="w-full p-2 mb-2 rounded bg-gray-700"></textarea>

    <button onclick="saveCode()" 
      class="bg-blue-500 px-4 py-2 rounded">Save</button>
  </div>

  <!-- Output -->
  <h2 class="text-xl mb-2">Saved Codes</h2>
  <div id="list"></div>

  <script>
    const API_KEY = "$2a$10$5SepU9r2PraMpGxplhm/Cu7O03sM2xA4p32tLGV0dQzhrnwl1S33K";
    const BIN_ID = "69c2c25eb7ec241ddc9c01f5";

    // GET DATA
    async function getCodes() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
      });
      const data = await res.json();
      return data.record.codes || [];
    }

    // SAVE CODE
    async function saveCode() {
      const title = document.getElementById('title').value;
      const code = document.getElementById('code').value;

      if (!title || !code) {
        alert("Enter both fields");
        return;
      }

      const codes = await getCodes();
      codes.push({ title, code });

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY
        },
        body: JSON.stringify({ codes })
      });

      document.getElementById('title').value = "";
      document.getElementById('code').value = "";

      displayCodes();
    }

    // DELETE CODE
    async function deleteCode(index) {
      const codes = await getCodes();
      codes.splice(index, 1);

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY
        },
        body: JSON.stringify({ codes })
      });

      displayCodes();
    }

    // DISPLAY
    async function displayCodes() {
      const codes = await getCodes();
      const list = document.getElementById('list');
      list.innerHTML = "";

      codes.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "bg-gray-800 p-4 mb-2 rounded";

        const title = document.createElement('h3');
        title.className = "font-bold";
        title.innerText = item.title;

        const pre = document.createElement('pre');
        pre.className = "bg-gray-700 p-2 rounded overflow-x-auto";
        pre.innerText = item.code;

        const delBtn = document.createElement('button');
        delBtn.innerText = "Delete";
        delBtn.className = "mt-2 bg-red-500 px-2 py-1 rounded";
        delBtn.onclick = () => deleteCode(index);

        div.appendChild(title);
        div.appendChild(pre);
        div.appendChild(delBtn);

        list.appendChild(div);
      });
    }

    displayCodes();
  </script>

</body>
</html>
