<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Vault Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Prism CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-4">M4 Vault</h1>

  <!-- Input -->
  <div class="bg-gray-800 p-4 rounded mb-4">
    <input id="title" placeholder="Enter title..." 
      class="w-full p-2 mb-2 rounded bg-gray-700">

    <textarea id="code" rows="6" placeholder="Paste your code..." 
      class="w-full p-2 mb-2 rounded bg-gray-700"></textarea>

    <select id="language" class="w-full p-2 mb-2 rounded bg-gray-700">
      <option value="java">Java</option>
      <option value="javascript">JavaScript</option>
      <option value="markup">HTML</option>
    </select>

    <button onclick="saveCode()" 
      class="bg-blue-500 px-4 py-2 rounded">Save</button>
  </div>

  <!-- Output -->
  <h2 class="text-xl mb-2">Saved Codes</h2>
  <div id="list"></div>

  <!-- Prism JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

  <script>
    function getCodes() {
      return JSON.parse(localStorage.getItem('codes') || '[]');
    }

    function saveCode() {
      const title = document.getElementById('title').value;
      const code = document.getElementById('code').value;
      const language = document.getElementById('language').value;

      if (!title || !code) {
        alert("Enter both fields");
        return;
      }

      const codes = getCodes();
      codes.push({ title, code, language });

      localStorage.setItem('codes', JSON.stringify(codes));

      document.getElementById('title').value = "";
      document.getElementById('code').value = "";

      displayCodes();
    }

    function deleteCode(index) {
      const codes = getCodes();
      codes.splice(index, 1);
      localStorage.setItem('codes', JSON.stringify(codes));
      displayCodes();
    }

    function copyCode(text) {
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    function displayCodes() {
      const codes = getCodes();
      const list = document.getElementById('list');
      list.innerHTML = "";

      codes.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "bg-gray-800 p-4 mb-2 rounded";

        const title = document.createElement('h3');
        title.className = "font-bold";
        title.innerText = item.title;

        const pre = document.createElement('pre');
        const codeBlock = document.createElement('code');

        codeBlock.className = "language-" + item.language;
        codeBlock.textContent = item.code;

        pre.className = "bg-gray-700 p-2 rounded overflow-x-auto";
        pre.appendChild(codeBlock);

        const copyBtn = document.createElement('button');
        copyBtn.innerText = "Copy";
        copyBtn.className = "mt-2 bg-green-500 px-2 py-1 rounded mr-2";
        copyBtn.onclick = () => copyCode(item.code);

        const deleteBtn = document.createElement('button');
        deleteBtn.innerText = "Delete";
        deleteBtn.className = "mt-2 bg-red-500 px-2 py-1 rounded";
        deleteBtn.onclick = () => deleteCode(index);

        div.appendChild(title);
        div.appendChild(pre);
        div.appendChild(copyBtn);
        div.appendChild(deleteBtn);

        list.appendChild(div);
      });

      Prism.highlightAll();
    }

    displayCodes();
  </script>

</body>
</html>
