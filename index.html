<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevVault IDE</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#1e1e1e] text-white flex h-screen">

<!-- SIDEBAR -->
<div class="w-60 bg-[#252526] p-3">
  <h2 class="text-lg font-bold mb-3">📁 Explorer</h2>

  <div class="space-y-2 text-sm">
    <div onclick="filterCategory('All')" class="cursor-pointer hover:text-blue-400">All Files</div>
    <div onclick="filterCategory('Java')" class="cursor-pointer">Java</div>
    <div onclick="filterCategory('Web')" class="cursor-pointer">Web</div>
    <div onclick="filterCategory('DSA')" class="cursor-pointer">DSA</div>
    <div onclick="filterCategory('Notes')" class="cursor-pointer">Notes</div>
  </div>

  <hr class="my-3 border-gray-700">

  <div id="fileList"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

  <!-- TOP BAR -->
  <div class="bg-[#333] px-4 py-2 flex justify-between items-center">
    <span id="currentFile">No file selected</span>
    <button onclick="saveNew()" class="bg-blue-600 px-3 py-1 rounded">+ New</button>
  </div>

  <!-- EDITOR -->
  <textarea id="editor" class="flex-1 bg-[#1e1e1e] p-4 outline-none font-mono text-sm"></textarea>

  <!-- ACTION BAR -->
  <div class="bg-[#252526] p-2 flex gap-2">
    <button onclick="updateFile()" class="bg-green-600 px-3 py-1 rounded">Save</button>
    <button onclick="deleteFile()" class="bg-red-600 px-3 py-1 rounded">Delete</button>
  </div>

</div>

<script>
const API_KEY = "$2a$10$5SepU9r2PraMpGxplhm/Cu7O03sM2xA4p32tLGV0dQzhrnwl1S33K";
const BIN_ID = "69c2c25eb7ec241ddc9c01f5";

let files = [];
let currentIndex = null;
let currentCategory = "All";

// FETCH
async function loadFiles() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });
  const data = await res.json();
  files = data.record.codes || [];
  renderList();
}

// RENDER SIDEBAR FILES
function renderList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files
    .filter(f => currentCategory === "All" || f.category === currentCategory)
    .forEach((file, index) => {
      const div = document.createElement("div");
      div.className = "cursor-pointer text-sm p-1 hover:bg-gray-700";

      div.innerText = "📄 " + file.title;
      div.onclick = () => openFile(index);

      list.appendChild(div);
    });
}

// OPEN FILE
function openFile(index) {
  currentIndex = index;
  document.getElementById("editor").value = files[index].code;
  document.getElementById("currentFile").innerText = files[index].title;
}

// FILTER
function filterCategory(cat) {
  currentCategory = cat;
  renderList();
}

// NEW FILE
function saveNew() {
  const name = prompt("Enter file name:");
  const category = prompt("Category (Java/Web/DSA/Notes):") || "Notes";

  if (!name) return;

  files.push({ title: name, code: "", category });
  currentIndex = files.length - 1;

  saveToCloud();
}

// UPDATE FILE
function updateFile() {
  if (currentIndex === null) return alert("Select file");

  files[currentIndex].code = document.getElementById("editor").value;
  saveToCloud();
}

// DELETE FILE
function deleteFile() {
  if (currentIndex === null) return;

  files.splice(currentIndex, 1);
  currentIndex = null;

  document.getElementById("editor").value = "";
  document.getElementById("currentFile").innerText = "No file selected";

  saveToCloud();
}

// SAVE TO CLOUD
async function saveToCloud() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ codes: files })
  });

  renderList();
}

// INIT
loadFiles();
</script>

</body>
</html>
