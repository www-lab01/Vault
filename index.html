<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollegeHub - Official College Social Network</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader">
            <i class="fas fa-graduation-cap"></i>
            <p>Loading CollegeHub...</p>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification hidden">
        <span id="notificationText"></span>
        <button onclick="hideNotification()">&times;</button>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-university"></i>
                <span>CollegeHub</span>
            </div>
            <div class="nav-search">
                <input type="text" id="globalSearch" placeholder="🔍 Search posts, notes, people...">
            </div>
            <div class="nav-tabs" id="navTabs">
                <button class="nav-tab active" data-tab="feed"><i class="fas fa-rss"></i></button>
                <button class="nav-tab" data-tab="notes"><i class="fas fa-book"></i></button>
                <button class="nav-tab" data-tab="videos"><i class="fab fa-youtube"></i></button>
                <button class="nav-tab" data-tab="chat"><i class="fab fa-whatsapp"></i></button>
                <button class="nav-tab" data-tab="updates"><i class="fas fa-bullhorn"></i></button>
                <button class="nav-tab" data-tab="complaints"><i class="fas fa-exclamation-triangle"></i></button>
            </div>
            <div class="nav-user">
                <button id="notificationBell" class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notificationBadge">0</span>
                </button>
                <img src="https://ui-avatars.com/api/?name=Student&background=667eea" id="userAvatar" class="avatar">
                <div class="user-info">
                    <span id="userName">Login</span>
                    <i class="fas fa-chevron-down dropdown-toggle"></i>
                </div>
                <div class="dropdown-menu">
                    <a href="#" id="viewProfile"><i class="fas fa-user"></i> Profile</a>
                    <a href="#" id="adminPanel" style="display:none"><i class="fas fa-crown"></i> Admin</a>
                    <a href="#" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Feed -->
        <div id="feed" class="tab-content active">
            <div class="create-section">
                <div class="create-header">
                    <img src="https://ui-avatars.com/api/?name=Student" class="avatar">
                    <textarea id="postContent" placeholder="What's new in college today? 📚✨ #CollegeLife" rows="3"></textarea>
                </div>
                <div class="create-actions">
                    <label class="action-btn">
                        <i class="fas fa-image"></i>
                        <input type="file" id="postImage" accept="image/*" capture="camera">
                    </label>
                    <label class="action-btn">
                        <i class="fab fa-youtube"></i>
                        <input type="url" id="postVideo" placeholder="YouTube URL">
                    </label>
                    <button class="post-btn" onclick="createPost()">
                        <i class="fas fa-paper-plane"></i> Post
                    </button>
                </div>
            </div>
            <div id="postsContainer"></div>
        </div>

        <!-- Notes -->
        <div id="notes" class="tab-content">
            <div class="section-header">
                <h2><i class="fas fa-book"></i> Study Notes</h2>
                <button class="fab-btn" onclick="showNoteModal()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="filter-bar">
                <select id="noteFilter">
                    <option value="">All Subjects</option>
                    <option value="CS">Computer Science</option>
                    <option value="ECE">Electronics</option>
                    <option value="MECH">Mechanical</option>
                    <option value="CIVIL">Civil</option>
                    <option value="MATH">Mathematics</option>
                </select>
            </div>
            <div id="notesContainer" class="cards-grid"></div>
        </div>

        <!-- Videos -->
        <div id="videos" class="tab-content">
            <div class="section-header">
                <h2><i class="fab fa-youtube"></i> College Videos</h2>
                <button class="fab-btn" onclick="showVideoModal()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="videosContainer" class="videos-grid"></div>
        </div>

        <!-- Chat -->
        <div id="chat" class="tab-content full-height">
            <div class="chat-sidebar">
                <div class="chat-room active" data-room="general">
                    <i class="fas fa-comments"></i> General
                </div>
                <div class="chat-room" data-room="cs">
                    <i class="fas fa-laptop-code"></i> CS Dept
                </div>
                <div class="chat-room" data-room="ece">
                    <i class="fas fa-microchip"></i> ECE Dept
                </div>
            </div>
            <div class="chat-main">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" id="chatInput" placeholder="Type message...">
                    <button onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Updates -->
        <div id="updates" class="tab-content">
            <div class="section-header">
                <h2><i class="fas fa-bullhorn"></i> Official Updates</h2>
            </div>
            <div id="updatesContainer"></div>
        </div>

        <!-- Complaints -->
        <div id="complaints" class="tab-content">
            <div class="section-header">
                <h2><i class="fas fa-exclamation-triangle"></i> Complaints</h2>
                <button class="fab-btn danger" onclick="showComplaintModal()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="complaintsContainer"></div>
        </div>
    </main>

    <!-- Modals -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Study Note</h3>
                <span class="close" onclick="closeModal('noteModal')">&times;</span>
            </div>
            <form id="noteForm">
                <input type="text" id="noteTitle" placeholder="Note Title *" required>
                <select id="noteSubject" required>
                    <option value="">Select Subject</option>
                    <option value="CS">Computer Science</option>
                    <option value="ECE">Electronics & Comm</option>
                    <option value="MECH">Mechanical</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="MATH">Mathematics</option>
                    <option value="PHYSICS">Physics</option>
                </select>
                <textarea id="noteContent" placeholder="Detailed notes..." rows="8" required></textarea>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('noteModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Note</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Share Video</h3>
                <span class="close" onclick="closeModal('videoModal')">&times;</span>
            </div>
            <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=...">
            <button class="btn-primary" onclick="saveVideo()">Share Video</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal overlay-full">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Welcome to <span class="brand">CollegeHub</span></h2>
                <p>Connect with your college community</p>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="studentId" placeholder="Student ID" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary full-width">Login</button>
                </form>
                <div class="demo-info">
                    <strong>Demo Login:</strong><br>
                    STUDENT001 / 123456<br>
                    STUDENT002 / 123456
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Auto-hide loading after 2s
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
        }, 2000);
    </script>
</body>
</html>
